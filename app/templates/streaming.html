{% extends 'base.html' %}
{% block content %}
<div style="max-width:1280px;margin:0 auto;padding:48px 32px;position:relative;z-index:1;">

  <div style="margin-bottom:40px;">
    <p style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px;">Where to Watch</p>
    <h1 style="font-family:'Clash Display',sans-serif;font-size:48px;font-weight:700;color:var(--white);letter-spacing:-1px;line-height:1;margin-bottom:8px;">Streaming</h1>
    <p style="font-size:14px;color:var(--text2);">Pick a platform and browse what's streaming right now</p>
  </div>

  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:48px;" id="platform-grid">

    <!-- Netflix -->
    <button onclick="selectPlatform('netflix')" class="platform-btn" data-key="netflix" data-color="#E50914"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:#141414;display:flex;align-items:center;justify-content:center;">
        <span style="font-size:40px;font-weight:900;color:#E50914;font-family:Arial Black,Impact,sans-serif;letter-spacing:-2px;">NETFLIX</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(229,9,20,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Netflix →</span>
      </div>
    </button>

    <!-- Prime Video -->
    <button onclick="selectPlatform('prime')" class="platform-btn" data-key="prime" data-color="#00A8E1"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:#0f1923;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
        <span style="font-size:12px;font-weight:400;color:#00A8E1;font-family:Arial,sans-serif;letter-spacing:3px;">amazon</span>
        <span style="font-size:24px;font-weight:900;color:#fff;font-family:Arial Black,sans-serif;letter-spacing:-1px;">prime video</span>
        <div style="width:36px;height:2px;background:#00A8E1;border-radius:2px;margin-top:4px;"></div>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,100,180,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Prime →</span>
      </div>
    </button>

    <!-- Disney+ -->
    <button onclick="selectPlatform('disney')" class="platform-btn" data-key="disney" data-color="#113CCF"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#0a1a5e,#040e36 70%);display:flex;align-items:center;justify-content:center;gap:4px;">
        <span style="font-size:30px;font-weight:900;color:#fff;font-family:Georgia,serif;letter-spacing:-1px;">Disney</span>
        <span style="font-size:44px;font-weight:900;color:#4a90e2;font-family:Arial Black,sans-serif;line-height:1;margin-top:-8px;">+</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(17,60,207,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Disney+ →</span>
      </div>
    </button>

    <!-- Apple TV+ -->
    <button onclick="selectPlatform('apple')" class="platform-btn" data-key="apple" data-color="#555"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:#000;display:flex;align-items:center;justify-content:center;gap:12px;">
        <svg viewBox="0 0 814 1000" style="width:38px;fill:#fff;flex-shrink:0;">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.7 0 663 0 541.8c0-207.9 135.5-318 269-318 67 0 122.3 43.8 164 43.8 39.5 0 101-46.2 177.3-46.2 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
        </svg>
        <div style="line-height:1.1;">
          <div style="font-size:24px;font-weight:300;color:#fff;font-family:-apple-system,Arial,sans-serif;">TV</div>
          <div style="font-size:24px;font-weight:300;color:#fff;font-family:-apple-system,Arial,sans-serif;">+</div>
        </div>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(80,80,80,0.8),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Apple TV+ →</span>
      </div>
    </button>

    <!-- Max -->
    <button onclick="selectPlatform('hbo')" class="platform-btn" data-key="hbo" data-color="#002BE7"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#001060,#000a2e 70%);display:flex;align-items:center;justify-content:center;">
        <span style="font-size:56px;font-weight:900;color:#fff;font-family:Arial Black,sans-serif;letter-spacing:-4px;text-shadow:0 0 40px rgba(0,80,255,0.5);">max</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,43,231,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Max →</span>
      </div>
    </button>

    <!-- Paramount+ -->
    <button onclick="selectPlatform('paramount')" class="platform-btn" data-key="paramount" data-color="#0064FF"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#001a47,#000b1f);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;">
        <svg viewBox="0 0 200 100" style="width:70px;fill:#fff;">
          <polygon points="100,5 150,70 170,70 100,0 30,70 50,70"/>
          <polygon points="100,20 70,80 130,80"/>
          <rect x="20" y="75" width="160" height="8" rx="4"/>
        </svg>
        <span style="font-size:15px;font-weight:900;color:#fff;font-family:Arial Black,sans-serif;letter-spacing:1px;">PARAMOUNT<span style="color:#4a90e2;">+</span></span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,100,255,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Paramount+ →</span>
      </div>
    </button>

    <!-- Hotstar -->
    <button onclick="selectPlatform('hotstar')" class="platform-btn" data-key="hotstar" data-color="#1F80E0"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#001a3d,#000b1f);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
        <span style="font-size:11px;font-weight:600;color:#ffffff88;font-family:Arial,sans-serif;letter-spacing:2px;text-transform:uppercase;">Disney+</span>
        <span style="font-size:34px;font-weight:900;color:#1F80E0;font-family:Arial Black,sans-serif;letter-spacing:-1px;line-height:1;">Hotstar</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(31,128,224,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse Hotstar →</span>
      </div>
    </button>

    <!-- JioCinema -->
    <button onclick="selectPlatform('jiocinema')" class="platform-btn" data-key="jiocinema" data-color="#5C2D91"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#2d0050,#1a0033 70%);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
        <span style="font-size:13px;font-weight:700;color:#a855f7;font-family:Arial,sans-serif;letter-spacing:4px;text-transform:uppercase;">JIO</span>
        <span style="font-size:30px;font-weight:900;color:#fff;font-family:Arial Black,sans-serif;letter-spacing:-1px;line-height:1;">Cinema</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(92,45,145,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse JioCinema →</span>
      </div>
    </button>

    <!-- SonyLIV -->
    <button onclick="selectPlatform('sonyliv')" class="platform-btn" data-key="sonyliv" data-color="#FF3A3A"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a0000,#0d0000);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
        <span style="font-size:13px;font-weight:400;color:#FF3A3A;font-family:Arial,sans-serif;letter-spacing:5px;text-transform:uppercase;">SONY</span>
        <span style="font-size:36px;font-weight:900;color:#fff;font-family:Arial Black,sans-serif;letter-spacing:-1px;line-height:1;">LIV</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(255,58,58,0.9),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse SonyLIV →</span>
      </div>
    </button>

    <!-- MUBI -->
    <button onclick="selectPlatform('mubi')" class="platform-btn" data-key="mubi" data-color="#444"
      style="position:relative;border-radius:18px;overflow:hidden;border:2px solid transparent;cursor:pointer;padding:0;transition:all 0.28s;aspect-ratio:16/9;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1c1c1c,#000);display:flex;align-items:center;justify-content:center;">
        <span style="font-size:50px;font-weight:900;color:#fff;font-family:Georgia,Times New Roman,serif;letter-spacing:-2px;line-height:1;">MUBI</span>
      </div>
      <div class="phover" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(60,60,60,0.8),transparent 60%);opacity:0;transition:opacity 0.2s;display:flex;align-items:flex-end;padding:14px;">
        <span style="font-family:'Clash Display',sans-serif;font-size:12px;font-weight:700;color:#fff;">Browse MUBI →</span>
      </div>
    </button>

  </div>

  <!-- Movies section -->
  <div id="movies-section" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding:16px 20px;background:var(--surface);border:1px solid var(--border2);border-radius:14px;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div id="platform-badge" style="width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;"></div>
        <div>
          <h2 id="platform-title" style="font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--white);letter-spacing:-0.5px;line-height:1;"></h2>
          <p style="font-size:12px;color:var(--text3);margin-top:3px;">Movies available to stream now</p>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <a id="platform-link" href="#" target="_blank"
          style="background:var(--surface2);border:1px solid var(--border2);color:var(--accent2);text-decoration:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;font-family:'Clash Display',sans-serif;">
          Open Platform ↗
        </a>
        <button onclick="clearPlatform()"
          style="background:none;border:1px solid var(--border);color:var(--text3);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;">
          ← Back
        </button>
      </div>
    </div>
    <div id="streaming-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);">Loading...</div>
    </div>
  </div>

</div>

<!-- Where to Watch modal -->
<div id="watch-modal" style="display:none;position:fixed;inset:0;background:rgba(7,8,15,0.9);backdrop-filter:blur(14px);z-index:500;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:500px;box-shadow:0 40px 80px rgba(0,0,0,0.7);">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>
        <p id="watch-modal-title" style="font-family:'Clash Display',sans-serif;font-size:20px;font-weight:700;color:var(--white);"></p>
        <p style="font-size:12px;color:var(--text3);margin-top:3px;">Available streaming platforms</p>
      </div>
      <button onclick="closeWatchModal()" style="background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;">&#x2715;</button>
    </div>
    <div id="watch-platforms"><div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">Finding where to watch...</div></div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:center;">
      <a id="watch-tmdb-link" href="#" target="_blank" style="font-size:12px;color:var(--text3);text-decoration:none;">View all options on TMDB ↗</a>
    </div>
  </div>
</div>

<style>
.platform-btn:hover .phover { opacity: 1 !important; }
.platform-btn:hover { transform: translateY(-8px) scale(1.03) !important; box-shadow: 0 28px 60px rgba(0,0,0,0.65) !important; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const PLATFORM_URLS = {
  netflix:'https://www.netflix.com/search?q=', prime:'https://www.amazon.com/s?k=',
  disney:'https://www.disneyplus.com/search/', apple:'https://tv.apple.com/search?term=',
  hbo:'https://www.max.com/search?q=', paramount:'https://www.paramountplus.com/search/',
  hotstar:'https://www.hotstar.com/in/search?q=', jiocinema:'https://www.jiocinema.com/search/',
  sonyliv:'https://www.sonyliv.com/search?query=', mubi:'https://mubi.com/en/films?q='
};
const PLATFORM_COLORS = {
  netflix:'#E50914', prime:'#00A8E1', disney:'#113CCF', apple:'#555', hbo:'#002BE7',
  paramount:'#0064FF', hotstar:'#1F80E0', jiocinema:'#5C2D91', sonyliv:'#FF3A3A', mubi:'#444'
};
const PLATFORM_NAMES = {
  netflix:'Netflix', prime:'Amazon Prime', disney:'Disney+', apple:'Apple TV+',
  hbo:'Max', paramount:'Paramount+', hotstar:'Hotstar', jiocinema:'JioCinema',
  sonyliv:'SonyLIV', mubi:'MUBI'
};
const ICON_SVG = `<svg viewBox="0 0 24 24" fill="currentColor" style="width:28px;height:28px"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>`;

async function selectPlatform(key) {
  const color = PLATFORM_COLORS[key] || '#6c63ff';
  const name  = PLATFORM_NAMES[key]  || key;

  document.querySelectorAll('.platform-btn').forEach(b => {
    const sel = b.dataset.key === key;
    b.style.borderColor = sel ? color : 'transparent';
    b.style.transform   = sel ? 'translateY(-8px) scale(1.03)' : '';
    b.style.boxShadow   = sel ? `0 28px 60px rgba(0,0,0,0.65), 0 0 0 2px ${color}` : '0 4px 20px rgba(0,0,0,0.5)';
  });

  const section = document.getElementById('movies-section');
  section.style.display = 'block';
  setTimeout(() => section.scrollIntoView({behavior:'smooth', block:'start'}), 100);

  document.getElementById('platform-badge').style.background = color;
  document.getElementById('platform-badge').textContent = name.substring(0,2).toUpperCase();
  document.getElementById('platform-title').textContent = name;
  document.getElementById('platform-link').href = PLATFORM_URLS[key] || '#';

  const grid = document.getElementById('streaming-grid');
  grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px 20px;">
    <div style="width:44px;height:44px;border:3px solid ${color}33;border-top-color:${color};border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 18px;"></div>
    <p style="color:var(--text3);font-size:13px;">Loading ${name} movies...</p>
  </div>`;

  try {
    const res  = await fetch(`/api/streaming/movies/${key}`);
    const data = await res.json();
    const movies = data.movies || [];

    if (!movies.length) {
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:70px 20px;">
        <div style="font-size:48px;margin-bottom:14px;">📡</div>
        <p style="color:var(--text2);font-size:15px;font-weight:600;margin-bottom:8px;">No movies found</p>
        <p style="color:var(--text3);font-size:13px;">Try switching to mobile hotspot or VPN.</p>
      </div>`;
      return;
    }

    grid.innerHTML = '';
    movies.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'card-enter';
      card.style.cssText = `animation-delay:${i*25}ms;position:relative;border-radius:14px;overflow:hidden;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:transform 0.25s,box-shadow 0.25s,border-color 0.2s;`;
      const st = m.title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
      card.innerHTML = `
        ${m.poster ? `<img src="${m.poster}" loading="lazy" style="width:100%;height:230px;object-fit:cover;display:block;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div style="width:100%;height:230px;background:var(--bg2);display:${m.poster?'none':'flex'};align-items:center;justify-content:center;color:var(--text3);">${ICON_SVG}</div>
        <div class="coi" style="position:absolute;inset:0;background:linear-gradient(to top,rgba(7,8,15,0.97) 0%,transparent 55%);padding:12px;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;transition:opacity 0.22s;">
          <p style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px;font-family:'Clash Display',sans-serif;">${m.title}</p>
          <p style="font-size:11px;color:var(--text2);margin-bottom:8px;">${m.year||'—'} &middot; ★ ${m.rating}/10</p>
          <div style="display:flex;gap:6px;">
            <button onclick="event.stopPropagation();window.location.href='/movie/${m.id}'" style="flex:1;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:11px;font-weight:600;padding:7px 4px;border-radius:7px;cursor:pointer;">Details</button>
            <button onclick="event.stopPropagation();openWatchModal(${m.id},'${st}')" style="flex:1;background:${color};border:none;color:#fff;font-size:11px;font-weight:600;padding:7px 4px;border-radius:7px;cursor:pointer;">Watch</button>
          </div>
        </div>`;
      card.addEventListener('mouseenter', () => { card.style.transform='translateY(-8px) scale(1.02)'; card.style.boxShadow=`0 24px 48px rgba(0,0,0,0.55)`; card.style.borderColor=color+'66'; card.querySelector('.coi').style.opacity='1'; });
      card.addEventListener('mouseleave', () => { card.style.transform=''; card.style.boxShadow=''; card.style.borderColor='var(--border)'; card.querySelector('.coi').style.opacity='0'; });
      card.addEventListener('click', () => window.location.href=`/movie/${m.id}`);
      grid.appendChild(card);
    });
  } catch(e) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text3);">Failed to load. Please try again.</div>`;
  }
}

function clearPlatform() {
  document.getElementById('movies-section').style.display = 'none';
  document.querySelectorAll('.platform-btn').forEach(b => { b.style.borderColor='transparent'; b.style.transform=''; b.style.boxShadow='0 4px 20px rgba(0,0,0,0.5)'; });
  window.scrollTo({top:0, behavior:'smooth'});
}

async function openWatchModal(movieId, title) {
  document.getElementById('watch-modal-title').textContent = title;
  document.getElementById('watch-platforms').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">Finding where to watch...</div>';
  document.getElementById('watch-modal').style.display = 'flex';
  try {
    const res  = await fetch(`/api/streaming/where/${movieId}`);
    const data = await res.json();
    document.getElementById('watch-tmdb-link').href = data.tmdb_link || '#';
    const platforms = data.platforms || [];
    if (!platforms.length) { document.getElementById('watch-platforms').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;">Not found on tracked platforms in your region.</div>'; return; }
    const stream = platforms.filter(p=>p.type==='stream');
    const rent   = platforms.filter(p=>p.type==='rent');
    const buy    = platforms.filter(p=>p.type==='buy');
    const rg = (label, items) => {
      if (!items.length) return '';
      let s = `<p style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;">${label}</p><div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;">`;
      items.forEach(p => { s += `<a href="${data.tmdb_link||'#'}" target="_blank" style="display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;padding:12px 16px;text-decoration:none;flex:1;min-width:140px;transition:border-color 0.2s;" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border2)'">${p.logo?`<img src="${p.logo}" style="width:32px;height:32px;border-radius:7px;object-fit:contain;background:#fff;padding:2px;" onerror="this.style.display='none'">`:`<div style="width:32px;height:32px;border-radius:7px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">${p.name[0]}</div>`}<div><p style="font-size:13px;font-weight:700;color:var(--white);">${p.name}</p><p style="font-size:10px;color:var(--accent2);">${label==='Stream'?'Watch now ↗':label+' ↗'}</p></div></a>`; });
      return s + '</div>';
    };
    document.getElementById('watch-platforms').innerHTML = rg('Stream',stream)+rg('Rent',rent)+rg('Buy',buy);
  } catch(e) { document.getElementById('watch-platforms').innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3);">Failed to load.</div>'; }
}

function closeWatchModal() { document.getElementById('watch-modal').style.display='none'; }
document.getElementById('watch-modal').addEventListener('click', function(e) { if(e.target===this) closeWatchModal(); });
</script>
{% endblock %}
